version: '3.8'

services:
  web:
    build: .
    ports:
      - "80:80"
      - "8080:8080"
      - "2222:22" # Mapping 2222 to 22 to avoid conflict with host SSH if running locally
    volumes:
      - ./terrain-rental:/app/terrain-rental
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: Sek_Thorn-db
      MYSQL_ROOT_PASSWORD: Hello@123
    ports:
      - "3306:3306"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
